<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - Mi Restaurante</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body class="paginaCocina">

    <header class="headerCocina">
        <h1>Comandas Activas</h1>
        <button class="boton botonSalir">Cerrar sesión</button>
    </header>

    <main class="contenedorCocina">
        <div class="tablaComandasHeader">
            <div>Mesa</div>
            <div>Tiempo</div>
            <div>Estado</div>
            <div>Acciones</div>
        </div>
        <div id="listaComandas" class="listaComandas">
            </div>
    </main>

    <div id="modalReceta" class="modal oculto">
        <div class="contenidoModal">
            <h2 id="tituloModalReceta">Receta del Pedido</h2>
            <div id="contenedorRecetasModal">
                </div>
            <div class="accionesFormulario">
                <button type="button" class="boton botonCancelar">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="cocina.js"></script>
</body>
</html>
